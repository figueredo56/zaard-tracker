<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZAARD Tracker | Protocolo Panga</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            background-image: url('184sin_titulo_20260715225022.png');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-attachment: fixed;
            color: #fff;
            font-family: 'Arial', sans-serif;
            margin: 0;
            padding: 10px;
        }

        .frame-gold {
            border: 2px solid #d4af37;
            border-radius: 16px;
            background: rgba(5, 5, 10, 0.88);
            backdrop-filter: blur(10px);
            box-shadow: 0 0 20px rgba(212, 175, 55, 0.3);
        }

        .glow-text {
            text-shadow: 0 0 12px #d4af37;
            color: #d4af37;
        }

        .decor-img {
            border: 2px solid #d4af37;
            border-radius: 10px;
            object-fit: cover;
        }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen">

    <div class="frame-gold w-full max-w-4xl p-4 md:p-6 mx-auto">
        
        <!-- Cabecera -->
        <header class="text-center mb-4 flex flex-col items-center">
            <img src="60sin_titulo_20260509231919_1.png" alt="Emblema ZAARD & PANGA" class="decor-img w-16 h-16 md:w-20 md:h-20 mb-2">
            <h1 class="text-2xl md:text-4xl font-bold glow-text uppercase tracking-wider">ZAARD INNOVATION</h1>
            <p class="text-xs md:text-sm text-gray-400">Monitoreo Técnico On-Chain - Protocolo Panga</p>
        </header>

        <!-- Contenido Organizado -->
        <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
            
            <!-- Gráfica Principal (Más alta y visible) -->
            <div class="md:col-span-2 border border-yellow-600/50 rounded-xl p-4 bg-black/70 flex flex-col justify-between min-h-[220px]">
                <div class="flex justify-between items-center border-b border-yellow-600/30 pb-2 mb-2">
                    <h2 class="text-yellow-500 font-bold text-xs md:text-sm">Gráfica / EMA & Parabolic SAR</h2>
                    <span class="text-[10px] text-green-400 animate-pulse font-semibold">● En Vivo</span>
                </div>
                <div class="flex flex-col items-center justify-center text-center py-4 flex-grow">
                    <p class="text-xs md:text-sm text-gray-300 font-semibold mb-2">Ecosistema ZARD Sincronizado</p>
                    <p class="text-xs text-yellow-500/90 break-all mb-1">Contrato: <span class="text-gray-400">0x3468...4d65</span></p>
                    <p class="text-xs text-yellow-500/90 break-all">Pool: <span class="text-gray-400">0x7084...b0e9</span></p>
                </div>
            </div>

            <!-- Panel Lateral / Espacio de Imagen -->
            <div class="flex flex-col gap-3">
                
                <div class="h-28 w-full overflow-hidden rounded-xl border border-yellow-600/50 relative">
                    <img src="CC_20260430_215529.png" alt="Detalle" class="w-full h-full decor-img">
                </div>

                <div class="border border-yellow-600/50 rounded-xl p-3 bg-black/70 text-xs">
                    <p class="text-gray-300">Dueño: <span class="text-white font-semibold">Panga</span></p>
                    <p class="text-gray-300 mt-1">Red: <span class="text-white font-semibold">BSC</span></p>
                    <p class="text-green-400 mt-2 font-semibold">⚡ Pool V2 Activo</p>
                </div>

            </div>

        </div>

    </div>

    <script>
        const ZARD_CONTRACT = "0x3468ea4e6ce13ec4c7f8651f7efc6aa6046f4d65";
        const PANCAKE_POOL = "0x7084d8562532aea9f9239cdd63ea289c85e6b0e9";
    </script>
</body>
</html>
