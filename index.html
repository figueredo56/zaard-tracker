<!DOCTYPE html>
<html lang="es">

    <!-- Metaetiquetas Open Graph -->

    <meta property="og:image" content="https://raw.githubusercontent.com/figueredo56/zaard-tracker/refs/heads/main/189%20sin%20t%C3%ADtulo_20260720154813_2.png">

    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            background: linear-gradient(135deg, #1e0033 0%, #0d001a 50%, #001f3f 100%);
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-attachment: fixed;
            color: #fff;
            font-family: 'Arial', sans-serif;
            margin: 0;
            padding: 4px 10px;
        }

        /* Animación de bordes tricolor: Azul -> Verde -> Morado */
        @keyframes triColorGlow {
            0% {
                border-color: #00ffff;
                box-shadow: 0 0 20px rgba(0, 255, 255, 0.5), inset 0 0 15px rgba(0, 255, 255, 0.2);
            }
            33% {
                border-color: #22c55e;
                box-shadow: 0 0 25px rgba(34, 197, 94, 0.6), inset 0 0 15px rgba(34, 197, 94, 0.2);
            }
            66% {
                border-color: #a855f7;
                box-shadow: 0 0 30px rgba(168, 85, 247, 0.7), inset 0 0 20px rgba(168, 85, 247, 0.3);
            }
            100% {
                border-color: #00ffff;
                box-shadow: 0 0 20px rgba(0, 255, 255, 0.5), inset 0 0 15px rgba(0, 255, 255, 0.2);
            }
        }

        .frame-gold {
            border: 2px solid #00ffff;
            border-radius: 16px;
            background: rgba(10, 10, 25, 0.85);
            backdrop-filter: blur(12px);
            animation: triColorGlow 5s infinite ease-in-out;
        }

        .glow-player {
            border: 2px solid #00ffff;
            animation: triColorGlow 4s infinite ease-in-out;
        }

        .title-gradient {
            background: linear-gradient(135deg, #00ffff 0%, #a855f7 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 0 15px rgba(168, 85, 247, 0.5);
        }

        .space-nebula-bg {
            background: radial-gradient(circle at 50% 30%, #3b0764 0%, #1e1b4b 50%, #030712 100%);
            box-shadow: inset 0 0 20px rgba(168, 85, 247, 0.3);
        }

        .info-card-bg {
            background: linear-gradient(135deg, rgba(30, 0, 51, 0.9) 0%, rgba(10, 10, 25, 0.95) 100%);
        }

        .orders-box {
            background: linear-gradient(rgba(10, 10, 25, 0.85), rgba(10, 10, 25, 0.85)), url('https://raw.githubusercontent.com/figueredo56/zaard-tracker/refs/heads/main/184%20sin%20t%C3%ADtulo_20260715225022.png');
            background-size: cover;
            background-position: center;
        }
    </style>
</head>

        </div>

    </div>

    <script>
        window.addEventListener('DOMContentLoaded', () => {
            const audio = document.getElementById('zaard-audio');
            audio.volume = 0.3;
            
            audio.play().catch(error => {
                console.log("Autoplay bloqueado:", error);
                document.body.addEventListener('click', () => {
                    audio.play();
                }, { once: true });
            });
        });

        const ZARD_CONTRACT = "0x3468ea4e6ce13ec4c7f8651f7efc6aa6046f4d65";
        const PANCAKE_POOL = "0x7084d8562532aea9f9239cdd63ea289c85e6b0e9";
    </script>
